<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="display">
            <p>0</p>
        </div>
        <div class="buttons">
            <button class="cell-1">7</button>
            <button class="cell-2">8</button>
            <button class="cell-3">9</button>
            <button class="cell-4">4</button>
            <button class="cell-5">5</button>
            <button class="cell-6">6</button>
            <button class="cell-7">1</button>
            <button class="cell-8">2</button>
            <button class="cell-9">3</button>
            <button class="cell-10">C</button>
            <button class="cell-11">0</button>
            <button class="cell-12">=</button>
        </div>
    </div>
</body>
</html>
